name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm audit --audit-level=high

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run test:unit

      - run: npm run test:template-actions

      - run: npm run test:data-access

      - run: npm run test:filters

  browser:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: NEXT_PUBLIC_SUPABASE_URL=https://example.supabase.co NEXT_PUBLIC_SUPABASE_ANON_KEY=ci-placeholder npm run build

      - run: npm run test:pt:e2e:public

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pt-public-playwright-failure
          path: |
            test-results/pt-artifacts
            test-results/pt-html
          if-no-files-found: ignore
          retention-days: 7
